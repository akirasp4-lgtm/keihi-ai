<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>経費精算アプリ</title>
<style>
:root {
  --primary:#2563eb;--primary-light:#eff6ff;--success:#16a34a;
  --danger:#dc2626;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-800:#1f2937;
  --shadow:0 1px 3px rgba(0,0,0,.1);
  --r:10px;--bottom-nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:var(--gray-800);
     min-height:100vh;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom))}

/* ヘッダー */
.app-header{background:white;border-bottom:1px solid var(--gray-200);
            padding:0 16px;height:56px;display:flex;align-items:center;
            justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-title{font-size:16px;font-weight:700;color:var(--primary)}
.header-key-btn{font-size:11px;padding:6px 10px;border:1px solid var(--gray-200);
                border-radius:6px;background:white;color:var(--gray-500);cursor:pointer;white-space:nowrap}

/* レイアウト */
.main{max-width:640px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px}
.card{background:white;border-radius:var(--r);box-shadow:var(--shadow);
      padding:16px;margin-bottom:14px}

/* フォーム */
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray-500);
            margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.form-label.req::after{content:"*";color:var(--danger);margin-left:2px}
.form-control{width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:6px;
              font-size:16px;outline:none;background:white;margin-bottom:10px;font-family:inherit}
.form-control:focus{border-color:var(--primary)}
.form-control.auto-filled{border-color:#22c55e;background:#f0fdf4}

/* 撮影ボタン */
.capture-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.capture-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
             gap:6px;padding:20px 10px;border:2px dashed var(--gray-300);border-radius:var(--r);
             background:var(--gray-50);cursor:pointer;position:relative;
             font-size:14px;font-weight:600;color:var(--gray-500)}
.capture-btn:hover{background:#eff6ff;border-color:var(--primary)}
.capture-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.capture-btn .icon{font-size:28px}

/* プレビュー */
.preview-wrap{display:none}
.preview-wrap.show{display:block}
.receipt-thumb{width:100%;border-radius:6px;border:2px solid var(--gray-200);
               overflow:hidden;margin-bottom:14px;background:#000;position:relative}
.receipt-thumb img{width:100%;max-height:300px;object-fit:contain;display:block;margin:0 auto}

/* OCRオーバーレイ */
.ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);
             display:none;flex-direction:column;align-items:center;justify-content:center;
             gap:10px;border-radius:4px;padding:20px}
.ocr-overlay.show{display:flex}
.ocr-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);
             border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-text{color:white;font-size:13px;font-weight:600;text-align:center}

/* OCR結果バナー */
.ocr-result-banner{display:none;padding:10px 12px;border-radius:8px;margin-bottom:12px;
                   font-size:13px;font-weight:600;line-height:1.5}
.ocr-result-banner.show{display:block}
.ocr-result-banner.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.ocr-result-banner.partial{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.ocr-result-banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

/* ボタン */
.btn{width:100%;padding:14px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer}
.btn-success{background:var(--success);color:white}
.btn-primary{background:var(--primary);color:white}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200)}

/* 現場セクション */
.genba-section{background:#f0f7ff;padding:12px;border-radius:8px;margin-bottom:10px;border:1.5px solid #bfdbfe}

/* ピッカーボタン(📋選ぶ) */
.btn-picker{padding:12px 14px;border:1.5px solid var(--primary);background:white;color:var(--primary);
            border-radius:6px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;font-family:inherit}
.btn-picker:active{background:var(--primary-light)}

/* ピッカーモーダル */
.picker-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;
                 align-items:center;justify-content:center;padding:12px;padding-bottom:calc(12px + var(--safe-bottom))}
.picker-modal-bg.show{display:flex}
.picker-modal-box{background:white;border-radius:14px;width:100%;max-width:520px;height:85vh;max-height:720px;
                  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.picker-header{display:flex;justify-content:space-between;align-items:center;
               padding:14px 16px;border-bottom:1px solid var(--gray-200);font-size:16px}
.picker-header button{border:none;background:none;font-size:22px;cursor:pointer;color:#666;
                      width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center}
.picker-header button:active{background:var(--gray-100)}
.picker-list{flex:1;overflow-y:auto;padding:4px 8px 8px;-webkit-overflow-scrolling:touch}
.picker-item{padding:14px 12px;border-bottom:1px solid var(--gray-100);cursor:pointer;border-radius:6px}
.picker-item:hover{background:#eff6ff}
.picker-item:active{background:#dbeafe}
.picker-item:last-child{border-bottom:none}
.picker-item .p-main{font-weight:bold;font-size:15px;color:var(--gray-800)}
.picker-item .p-sub{font-size:12px;color:var(--gray-500);margin-top:3px}
.picker-item .p-jobno{display:inline-block;background:#f3e8ff;color:#7c3aed;font-size:10px;
                      padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:700}
.picker-empty{padding:40px 20px;text-align:center;color:#999;font-size:13px}
.picker-footer{padding:10px 14px;border-top:1px solid var(--gray-200);font-size:11px;
               color:var(--gray-500);background:var(--gray-50);text-align:center}

/* リスト */
.expense-card{display:flex;align-items:center;justify-content:space-between;
              padding:12px;border-bottom:1px solid var(--gray-100)}
.cat-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gray-100)}

/* 下部ナビ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
            height:calc(var(--bottom-nav-h) + var(--safe-bottom));
            background:white;border-top:1px solid var(--gray-200);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
         font-size:10px;font-weight:600;color:var(--gray-400);background:none;border:none;gap:2px}
.nav-btn.active{color:var(--primary)}

</style>
</head>
<body>


<header class="app-header">
  <div class="app-title">経費精算アプリ</div>
  <div style="display:flex;gap:6px">
    <a href="guide_staff.html" class="header-key-btn" style="text-decoration:none">使い方</a>
  </div>
</header>

<main class="main">
  <!-- 氏名 -->
  <div class="card">
    <label class="form-label req">氏名</label>
    <input type="text" class="form-control" id="userName" placeholder="山田 太郎"
           oninput="localStorage.setItem('user_name_v6', this.value)">
    <div style="font-size:11px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;
                border-radius:6px;padding:8px 10px;margin-top:-4px;line-height:1.5">
      ⚠️ <b>フルネーム</b>で入力してください（予定管理アプリでは苗字被り対策で省略表記になっているため、経費ではフルネームで統一します）
    </div>
  </div>

  <!-- 入力タブ -->
  <div class="tab-panel active" id="panel-input">
    <div class="card">
      <div id="uploadSection">
        <div class="capture-btns">
          <label class="capture-btn">
            <input type="file" accept="image/*" capture="environment" onchange="handleFile(this.files[0])">
            <span class="icon">📸</span>
            <span>カメラで撮影</span>
          </label>
          <label class="capture-btn">
            <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
            <span class="icon">🖼️</span>
            <span>写真を選択</span>
          </label>
        </div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <div class="receipt-thumb">
          <img id="receiptImg" src="" alt="レシート">
          <div class="ocr-overlay" id="ocrOverlay">
            <div class="ocr-spinner"></div>
            <div class="ocr-text" id="ocrStatusText">AI で解析中...</div>
          </div>
        </div>

        <div class="ocr-result-banner" id="ocrResultBanner"></div>

        <div id="formGrid">
          <label class="form-label req">日付</label>
          <input type="date" class="form-control" id="fDate">

          <label class="form-label req">金額（税込）</label>
          <input type="number" class="form-control" id="fAmount" placeholder="0" inputmode="numeric">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div>
              <label class="form-label">税率</label>
              <select class="form-control" id="fTax">
                <option value="10">10%</option>
                <option value="8">軽減8%（飲食）</option>
                <option value="0">対象外</option>
              </select>
            </div>
            <div>
              <label class="form-label">項目</label>
              <select class="form-control" id="fCategory">
                <option value="駐車場代">🅿️ 駐車場代 (パーキング)</option>
                <option value="仕入高">🔧 仕入高 (材料・部品・工具)</option>
                <option value="ガソリン">⛽ 車両費 (ガソリン代)</option>
                <option value="車両関係費">🔧 車両関係費 (修理・車用品)</option>
                <option value="消耗品費">📦 消耗品費 (材料以外)</option>
                <option value="事務用品">✏️ 事務用品</option>
                <option value="運賃">🚚 運賃 (宅急便など)</option>
                <option value="その他交通費">🚕 その他交通費 (タクシー等)</option>
                <option value="有料道路">🛣️ 有料道路 (高速道路代)</option>
                <option value="会議費">🍵 会議費 (社内飲食)</option>
                <option value="交際費">🍺 交際費 (社外飲食)</option>
                <option value="水道光熱">💡 水道光熱</option>
                <option value="租税公課">🏷️ 租税公課 (印紙など)</option>
                <option value="福利厚生">🩺 福利厚生</option>
              </select>
            </div>
          </div>

          <label class="form-label req">店名・購入場所</label>
          <input type="text" class="form-control" id="fStore" placeholder="例：コーナン">

          <div class="genba-section">
            <div id="masterStatus" style="font-size:11px;color:#6b7280;margin-bottom:8px">予定管理マスタを読込中…</div>

            <!-- 元請け名 -->
            <label class="form-label req">元請け名</label>
            <div style="display:flex;gap:6px;margin-bottom:8px">
              <input type="text" class="form-control" id="fMotouke" placeholder="マスタから選択 or 手入力" autocomplete="off" style="flex:1;margin-bottom:0">
              <button type="button" class="btn-picker" onclick="openPicker('motouke')">📋 選ぶ</button>
            </div>

            <!-- 現場名 -->
            <label class="form-label req">現場名</label>
            <div style="display:flex;gap:6px">
              <input type="text" class="form-control" id="fGenba" placeholder="マスタから選択 or 手入力" autocomplete="off" style="flex:1;margin-bottom:0">
              <button type="button" class="btn-picker" onclick="openPicker('genba')">📋 選ぶ</button>
            </div>

            <div id="jobNoBadge" style="display:none;font-size:12px;color:#16a34a;margin-top:8px;
                        background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:6px 10px">
              🔖 工番: <b id="jobNoText"></b>
            </div>
          </div>

          <label class="form-label">メモ</label>
          <input type="text" class="form-control" id="fMemo" placeholder="任意">

          <button class="btn btn-success" onclick="saveExpense()">保存して次へ</button>
          <button class="btn btn-ghost" style="margin-top:8px" onclick="resetForm()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- リストタブ -->
  <div class="tab-panel" id="panel-list" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center">
        <span style="font-weight:bold">保存済み経費</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <button class="btn btn-success"
                  style="width:auto;padding:8px 16px;font-size:12px"
                  onclick="sendToDrive()">📤 管理者に送信</button>
          <button onclick="exportJSON()"
                  style="font-size:10px;color:var(--gray-400);background:none;border:none;cursor:pointer;padding:0">
            ファイルで出力（バックアップ）
          </button>
        </div>
      </div>
      <div id="expenseCards"></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-in" onclick="switchTab('input',this)">
    <span style="font-size:20px">📝</span>入力
  </button>
  <button class="nav-btn" id="nav-li" onclick="switchTab('list',this)">
    <span style="font-size:20px">📋</span>リスト
  </button>
</nav>

<!-- 元請け/現場ピッカーモーダル -->
<div id="pickerModal" class="picker-modal-bg" onclick="if(event.target===this)closePicker()">
  <div class="picker-modal-box">
    <div class="picker-header">
      <b id="pickerTitle">選択</b>
      <button type="button" onclick="closePicker()" aria-label="閉じる">✕</button>
    </div>
    <div style="padding:10px 12px">
      <input type="search" id="pickerSearch" class="form-control"
             placeholder="🔍 検索（現場名・元請名・工番）"
             oninput="filterPickerList()" style="margin:0">
    </div>
    <div id="pickerList" class="picker-list"></div>
    <div class="picker-footer">
      マスタにない場合は <b>✕</b> で閉じて手入力欄に直接記入してください
    </div>
  </div>
</div>

<script>
// ================================================================
// カテゴリマスタ（借方科目・補助との対応）
// ================================================================
// 大項目=借方科目名称(JDL短名称)  中項目=借方補助名称  (20260420更新版スペックに準拠)
const CAT_MAP = {
  '駐車場代':     { account:'旅費交通', sub:'駐車場代',     tax:'10' },
  '仕入高':       { account:'仕入高',   sub:'',             tax:'10' },
  'ガソリン':     { account:'車両費',   sub:'ガソリン',     tax:'10' },
  '車両関係費':   { account:'車両費',   sub:'車両関係費',   tax:'10' },
  '消耗品費':     { account:'消耗品費', sub:'',             tax:'10' },
  '事務用品':     { account:'事務用品', sub:'',             tax:'10' },
  '運賃':         { account:'運賃',     sub:'',             tax:'10' },
  'その他交通費': { account:'旅費交通', sub:'その他交通費', tax:'10' },
  '有料道路':     { account:'旅費交通', sub:'有料道路',     tax:'10' },
  '会議費':       { account:'会議費',   sub:'',             tax:'10' },
  '交際費':       { account:'交際費',   sub:'',             tax:'10' },
  '水道光熱':     { account:'水道光熱', sub:'',             tax:'10' },
  '租税公課':     { account:'租税公課', sub:'',             tax:'0'  },
  '福利厚生':     { account:'福利厚生', sub:'',             tax:'10' },
};

// ================================================================
// 状態
// ================================================================
let expenses = (() => { try { return JSON.parse(localStorage.getItem('exp_v6') || '[]'); } catch { return []; } })();
let currentImg = null;

// 予定管理マスタ(元請/現場)
let motoukeMaster = [];   // [{name, company}]
let genbaMaster   = [];   // [{motouke, genba, jobNo, division, company}]

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('userName').value = localStorage.getItem('user_name_v6') || '';
  document.getElementById('fDate').value = today();
  renderList();
  loadMaster();
  setupMotoukeGenbaAutoFill();
});

// ================================================================
// 予定管理マスタの読み込み
// ================================================================
async function loadMaster() {
  const status = document.getElementById('masterStatus');
  try {
    const res = await fetch(WORKER_URL + '/master', { method: 'GET' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    motoukeMaster = data.motouke || [];
    genbaMaster   = data.genba   || [];

    // 24時間キャッシュ(オフライン時フォールバック用)
    try {
      localStorage.setItem('master_cache_v1', JSON.stringify({ ts: Date.now(), motoukeMaster, genbaMaster }));
    } catch {}

    renderMasterDatalists();
    status.textContent = `✅ マスタ読込完了 (元請${motoukeMaster.length}件 / 現場${genbaMaster.length}件)`;
    status.style.color = '#16a34a';
  } catch (err) {
    console.warn('[master] 取得失敗 → キャッシュ or 手入力', err);
    // キャッシュを試す
    try {
      const cached = JSON.parse(localStorage.getItem('master_cache_v1') || 'null');
      if (cached && cached.motoukeMaster) {
        motoukeMaster = cached.motoukeMaster;
        genbaMaster   = cached.genbaMaster || [];
        renderMasterDatalists();
        const ageH = Math.round((Date.now() - cached.ts) / 3600000);
        status.textContent = `⚠️ オフライン: キャッシュを使用中 (${ageH}時間前)`;
        status.style.color = '#b45309';
        return;
      }
    } catch {}
    status.textContent = '⚠️ マスタ取得失敗。手入力してください';
    status.style.color = '#dc2626';
  }
}

function renderMasterDatalists() {
  // 検索モーダル方式なので描画不要。初期状態だけマスタ件数を更新
  // (将来、よく使う現場をサジェストするなどの拡張ポイント)
}

// ================================================================
// 検索可能な元請/現場ピッカー(モーダル)
// ================================================================
let pickerMode = '';    // 'motouke' | 'genba'
let pickerItems = [];   // 現在表示中の候補配列

function openPicker(mode) {
  pickerMode = mode;
  const title = mode === 'motouke' ? '元請けを選択' : '現場を選択';
  document.getElementById('pickerTitle').textContent = title;
  document.getElementById('pickerSearch').value = '';
  document.getElementById('pickerModal').classList.add('show');
  filterPickerList();
  // 自動フォーカスは一部スマホでキーボードがすぐ出るのを嫌う場合があるため、控えめに遅延
  setTimeout(() => {
    const s = document.getElementById('pickerSearch');
    if (s && window.innerWidth > 600) s.focus();
  }, 100);
}

function closePicker() {
  document.getElementById('pickerModal').classList.remove('show');
}

function filterPickerList() {
  const rawQ = document.getElementById('pickerSearch').value.trim();
  const q = normalizeJa(rawQ);
  const list = document.getElementById('pickerList');

  // 現場ピッカー時、元請けが既に入力されていればそれで絞り込み(文字一致優先)
  const motoukeFilter = pickerMode === 'genba'
    ? document.getElementById('fMotouke').value.trim()
    : '';

  // 検索対象文字列(読みがあれば含めて全部マッチ候補にする)
  const hay = (it) => normalizeJa([it.main, it.sub, it.jobNo, it.yomi].filter(Boolean).join(' '));

  let items = [];
  if (pickerMode === 'motouke') {
    const names = [...new Set(motoukeMaster.map(m => m.name).filter(Boolean))].sort();
    items = names.map(n => ({
      main: n, sub: '', jobNo: '',
      yomi: (motoukeMaster.find(m => m.name === n) || {}).yomi || '',
      payload: { motouke: n },
    }));
  } else {
    const source = motoukeFilter
      ? genbaMaster.filter(g => g.motouke === motoukeFilter)
      : genbaMaster;
    items = source.map(g => ({
      main:  g.genba,
      sub:   g.motouke,
      jobNo: g.jobNo || '',
      yomi:  g.yomi  || '',  // 読み列(将来対応)
      payload: { motouke: g.motouke, genba: g.genba, jobNo: g.jobNo || '' },
    }));
  }

  // 検索クエリでフィルタ
  items = q ? items.filter(it => hay(it).includes(q)) : items;
  pickerItems = items;

  if (!items.length) {
    list.innerHTML = `<div class="picker-empty">
      ${q ? '「'+esc(q)+'」に一致する項目が見つかりませんでした' : 'マスタが空です'}<br>
      <span style="font-size:11px">✕ で閉じて手入力できます</span>
    </div>`;
    return;
  }

  // 表示上限(検索ないときの初期表示は300件まで)
  const shown = q ? items : items.slice(0, 300);
  list.innerHTML = shown.map((it, i) => `
    <div class="picker-item" onclick="pickItem(${i})">
      <div class="p-main">${esc(it.main)}${it.jobNo ? `<span class="p-jobno">${esc(it.jobNo)}</span>` : ''}</div>
      ${it.sub ? `<div class="p-sub">👔 ${esc(it.sub)}</div>` : ''}
    </div>
  `).join('') + (items.length > shown.length
    ? `<div class="picker-empty" style="padding:14px;color:#9ca3af;font-size:11px">…他${items.length - shown.length}件 (検索で絞り込めます)</div>`
    : '');
}

function pickItem(idx) {
  const p = pickerItems[idx]?.payload;
  if (!p) return;
  const mInput = document.getElementById('fMotouke');
  const gInput = document.getElementById('fGenba');
  const badge  = document.getElementById('jobNoBadge');
  const bText  = document.getElementById('jobNoText');

  if (pickerMode === 'motouke') {
    // 元請けが変わった場合は現場もクリア(整合性保持)
    if (mInput.value.trim() !== p.motouke) {
      gInput.value = '';
      badge.style.display = 'none';
    }
    mInput.value = p.motouke;
  } else {
    mInput.value = p.motouke;
    gInput.value = p.genba;
    if (p.jobNo) {
      bText.textContent = p.jobNo;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }
  closePicker();
}

// 手入力の変更で工番バッジを更新(マスタと一致する時だけ表示)
function setupMotoukeGenbaAutoFill() {
  const mInput = document.getElementById('fMotouke');
  const gInput = document.getElementById('fGenba');
  const badge  = document.getElementById('jobNoBadge');
  const bText  = document.getElementById('jobNoText');

  const refreshJobNo = () => {
    const m = mInput.value.trim();
    const g = gInput.value.trim();
    const hit = genbaMaster.find(x => x.motouke === m && x.genba === g);
    if (hit && hit.jobNo) {
      bText.textContent = hit.jobNo;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  };
  mInput.addEventListener('input', refreshJobNo);
  gInput.addEventListener('input', refreshJobNo);
}

function escAttr(s) { return String(s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/'/g, '&#39;'); }

// ================================================================
// 日本語検索用の正規化
//   ・カタカナ→ひらがな
//   ・全角英数→半角
//   ・濁点/半濁点の合成(NFKC)
//   ・大文字→小文字
//   ・空白除去
// 例:「ミツイリパーク」「みついりぱーく」「MITSUI」「ＭＩＴＳＵＩ」すべて同一扱い
// ================================================================
function normalizeJa(s) {
  if (!s) return '';
  return String(s)
    .normalize('NFKC')                    // 全角英数→半角、合成済み濁点に統一
    .toLowerCase()
    .replace(/[ァ-ヴ]/g, c =>              // カタカナ→ひらがな
      String.fromCharCode(c.charCodeAt(0) - 0x60))
    .replace(/\s+/g, '');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display='none');
  document.getElementById('panel-' + tab).style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'list') renderList();
}

// ================================================================
// ファイル処理
// ================================================================
async function handleFile(file) {
  if (!file) return;
  // MIMEが空（Android一部機種）は許容、明らかに非画像のみ弾く
  if (file.type && !file.type.startsWith('image/')) return;

  const resized = await resizeImg(file, 1600);
  if (!resized) { alert('画像の読み込みに失敗しました。別の写真を試してください。'); return; }

  currentImg = resized;
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('receiptImg').src = currentImg;
  document.getElementById('previewWrap').classList.add('show');

  await runGeminiOCR(currentImg);
}

// ================================================================
// OCR（Cloudflare Worker → Groq AI 経由）
// ================================================================
const WORKER_URL = 'https://keihi-ocr.akirasp4.workers.dev';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEegPlFZoQSGpxjXiRfqh7_rE7aiFml24ymjHwD98HwM8z_FopNeVR340RidNLR2D3Ag/exec';

async function runGeminiOCR(imgSrc) {
  const overlay   = document.getElementById('ocrOverlay');
  const statusTxt = document.getElementById('ocrStatusText');
  overlay.classList.add('show');
  statusTxt.textContent = '解析中...';
  hideBanner();

  const b64      = imgSrc.split(',')[1];
  const mimeType = imgSrc.split(';')[0].split(':')[1] || 'image/jpeg';

  const body = JSON.stringify({
    contents: [{
      parts: [
        { inlineData: { mimeType, data: b64 } },
        { text: `このレシート・領収書から情報を抽出し、必ずJSON形式のみで回答してください。

抽出項目：
- date: 日付（YYYY-MM-DD形式）
  ※「令和」「平成」と明記されている場合のみ和暦→西暦に変換してください。
  ※「26年4月17日」のように元号の記載がない2桁年は、西暦2000年代として扱ってください(例: "26年" → "2026", "25年" → "2025")。
  ※「2026/4/17」「2026-04-17」など西暦4桁はそのまま使ってください。
  例: "令和6年4月17日" → "2024-04-17" / "26年4月17日" → "2026-04-17"
- amount: 税込合計金額（整数。記号・カンマ不要）
- store: 店名・会社名（先頭に多い固有名詞）
- tax_rate: 税率（"10" または "8" または "0"。軽減税率マークがあれば "8"）

例：{"date":"2026-03-18","amount":1500,"store":"コーナン","tax_rate":"10"}
読み取れない項目はnullにしてください。` }
      ]
    }],
    generationConfig: { temperature: 0 }
  });

  try {
    const res  = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body
    });
    const data = await res.json();

    overlay.classList.remove('show');

    if (!res.ok) {
      const msg = data?.error?.message || `HTTP ${res.status}`;
      showBanner('error', `読み取りエラー: ${msg}<br><span style="font-size:11px;font-weight:normal">しばらく待ってから再試行してください</span>`);
      return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || '';
    if (!jsonStr) { showBanner('error', 'レシート情報を抽出できませんでした。手動で入力してください。'); return; }

    let parsed;
    try { parsed = JSON.parse(jsonStr); }
    catch { showBanner('error', 'レスポンスの解析に失敗しました。手動で入力してください。'); return; }

    const count = applyParsedData(parsed);
    if      (count >= 3) showBanner('success', `${count}項目を自動入力しました。内容を確認してください。`);
    else if (count >= 1) showBanner('partial', `${count}項目を入力しました。残りは手動で補完してください。`);
    else                 showBanner('error',   'レシート情報を特定できませんでした。手動で入力してください。');

  } catch (err) {
    overlay.classList.remove('show');
    showBanner('error', `通信エラー: ${err.message}`);
    console.error('[OCR]', err);
  }
}

function applyParsedData(parsed) {
  let count = 0;
  const valid = v => v !== null && v !== undefined && String(v) !== 'null' && String(v) !== '';
  if (valid(parsed.date))     { setField('fDate',   parsed.date);   count++; }
  if (valid(parsed.amount) && Number(parsed.amount) > 0) { setField('fAmount', parsed.amount); count++; }
  if (valid(parsed.store))    { setField('fStore',  parsed.store);  count++; }
  if (valid(parsed.tax_rate)) {
    const el = document.getElementById('fTax');
    if (['10','8','0'].includes(String(parsed.tax_rate))) { el.value = String(parsed.tax_rate); count++; }
  }
  return count;
}

function setField(id, value) {
  const el = document.getElementById(id);
  el.value = value;
  el.classList.add('auto-filled');
  el.addEventListener('input', () => el.classList.remove('auto-filled'), { once:true });
}

function showBanner(type, html) {
  const b = document.getElementById('ocrResultBanner');
  b.className = `ocr-result-banner ${type} show`;
  b.innerHTML = html;
}
function hideBanner() { document.getElementById('ocrResultBanner').className = 'ocr-result-banner'; }

// ================================================================
async function saveExpense() {
  const name   = document.getElementById('userName').value.trim();
  const date   = document.getElementById('fDate').value;
  const amount = Number(document.getElementById('fAmount').value);
  const store  = document.getElementById('fStore').value.trim();
  const cat    = document.getElementById('fCategory').value;

  const motouke = document.getElementById('fMotouke').value.trim();
  const genba   = document.getElementById('fGenba').value.trim();

  if (!name)    return alert('氏名を入力してください');
  if (!date)    return alert('日付を入力してください');
  if (!amount || amount <= 0) return alert('金額は1円以上入力してください');
  if (!store)   return alert('店名を入力してください');
  if (!motouke) return alert('元請け名を入力してください');
  if (!genba)   return alert('現場名を入力してください');

  // 重複チェック（日付・金額・店名が全て同じ）
  const isDup = expenses.some(e =>
    e.date === date && Number(e.amount) === amount && e.store === store
  );
  if (isDup && !confirm(`同じレシートが既に保存されています。\n（${date} / ¥${amount.toLocaleString()} / ${store}）\n\n続けて保存しますか？`)) return;

  const taxRate = document.getElementById('fTax').value;
  const catInfo = CAT_MAP[cat] || { account:cat, sub:'', tax:taxRate };

  // 予定管理マスタから工番を逆引き(元請+現場が一致するもの)
  const jobNoHit = genbaMaster.find(g => g.motouke === motouke && g.genba === genba);
  const jobNo = jobNoHit ? jobNoHit.jobNo : '';

  const thumb = await makeThumbnail(currentImg);
  expenses.unshift({
    id:        Date.now(),
    date,
    amount,
    store,
    category:  cat,
    account:   catInfo.account,
    sub:       catInfo.sub,
    tax:       taxRate,
    motouke:   motouke,
    genba:     genba,
    jobNo:     jobNo,
    memo:      document.getElementById('fMemo').value.trim(),
    name,
    img:       thumb,
  });
  try {
    localStorage.setItem('exp_v6', JSON.stringify(expenses));
  } catch {
    // 容量超過時は画像なしで保存
    expenses[0].img = null;
    localStorage.setItem('exp_v6', JSON.stringify(expenses));
    alert('画像の保存容量が上限に達したため、今回は画像なしで保存しました。');
  }
  resetForm();
  switchTab('list', document.getElementById('nav-li'));
}

function resetForm() {
  currentImg = null;
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('previewWrap').classList.remove('show');
  ['fAmount','fStore','fMemo','fMotouke','fGenba'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fDate').value = today();
  document.getElementById('fTax').value = '10';
  document.getElementById('jobNoBadge').style.display = 'none';
  hideBanner();
  document.querySelectorAll('.auto-filled').forEach(el => el.classList.remove('auto-filled'));
  document.querySelectorAll('input[type=file]').forEach(i => i.value='');
}

function renderList() {
  const cont = document.getElementById('expenseCards');
  if (!expenses.length) {
    cont.innerHTML = '<div style="text-align:center;padding:40px;color:#999">データなし</div>';
    return;
  }
  cont.innerHTML = expenses.map(e => `
    <div class="expense-card">
      <div>
        <div style="font-weight:bold;font-size:14px">${esc(e.store)}</div>
        <div style="font-size:11px;color:#666">
          ${e.date} · <span class="cat-badge">${esc(e.category)}</span>
          ${e.motouke||e.genba ? `<br>${esc(e.motouke||'')} / ${esc(e.genba||'')}` : ''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:bold;color:var(--primary);font-size:16px">¥${(Number(e.amount)||0).toLocaleString()}</div>
        <div style="font-size:11px;color:#666">${e.tax||'10'}%</div>
        <button onclick="del(${e.id})"
                style="font-size:10px;color:var(--danger);border:none;background:none;padding:4px">
          削除
        </button>
      </div>
    </div>`).join('');
}

function del(id) {
  if (!confirm('削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('exp_v6', JSON.stringify(expenses));
  renderList();
}

async function sendToDrive() {
  const name = document.getElementById('userName').value.trim();
  if (!name)             return alert('氏名を入力してください');
  if (!expenses.length)  return alert('データがありません');

  const btn = document.querySelector('[onclick="sendToDrive()"]');
  btn.textContent = '送信中...';
  btn.disabled = true;

  try {
    const res = await fetch(WORKER_URL + '/drive', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, expenses }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '送信失敗');

    if (confirm('✅ Googleドライブへの送信が完了しました！\n\nリストを削除しますか？')) {
      expenses = [];
      localStorage.setItem('exp_v6', JSON.stringify(expenses));
      renderList();
    }
  } catch(err) {
    alert('送信に失敗しました。\n' + err.message);
  } finally {
    btn.textContent = '📤 管理者に送信';
    btn.disabled = false;
  }
}

function exportJSON() {
  const name = document.getElementById('userName').value.trim();
  if (!name)        return alert('氏名を入力してください');
  if (!expenses.length) return alert('データがありません');

  const blob = new Blob([JSON.stringify({ name, expenses }, null, 2)], { type:'application/json' });
  const a    = document.createElement('a');
  const url  = URL.createObjectURL(blob);
  a.href     = url;
  a.download = `経費申請_${name}_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);

  // 出力後にリストを空にする
  if (confirm('管理者への送付が完了したらリストを空にしてください。\n今すぐ削除しますか？')) {
    expenses = [];
    localStorage.setItem('exp_v6', JSON.stringify(expenses));
    renderList();
  }
}

// ================================================================
// ユーティリティ
// ================================================================
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

async function makeThumbnail(dataUrl) {
  if (!dataUrl) return null;
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(1, 400/img.width, 400/img.height);
      const c = document.createElement('canvas');
      c.width  = img.width  * ratio;
      c.height = img.height * ratio;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.5));
    };
    img.onerror = () => res(null);
    img.src = dataUrl;
  });
}

async function resizeImg(file, max) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, max/img.width, max/img.height);
        const c = document.createElement('canvas');
        c.width  = img.width  * ratio;
        c.height = img.height * ratio;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.drawImage(img, 0, 0, c.width, c.height);
        res(c.toDataURL('image/jpeg', 0.88));
      };
      img.onerror = () => res(null);
      img.src = e.target.result;
    };
    r.onerror = () => res(null);
    r.readAsDataURL(file);
  });
}
