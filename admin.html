<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>経費精算 管理者コンソール</title>
<!-- Shift-JIS(CP932)エンコード用ライブラリ(JDL CSV取込互換) -->
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
<style>
:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--bg:#f3f4f6;--card:#fff;--border:#e5e7eb;--text:#1f2937}
body{font-family:sans-serif;background:var(--bg);color:var(--text);padding:20px;margin:0}
.header{background:white;padding:15px 24px;display:flex;justify-content:space-between;align-items:center;
        border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.header-title{font-weight:bold;font-size:20px}
.btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;border:none;font-size:13px}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.drop-zone{background:white;border:2px dashed #9ca3af;border-radius:12px;padding:40px;
           text-align:center;cursor:pointer;margin:20px 0;transition:background .15s}
.drop-zone:hover{background:#eff6ff;border-color:var(--primary)}
.person-section{background:white;border-radius:12px;padding:20px;margin-bottom:24px;
                box-shadow:0 1px 3px rgba(0,0,0,.1)}
.person-header{font-size:18px;font-weight:bold;border-bottom:2px solid var(--border);
               padding-bottom:10px;margin-bottom:16px;display:flex;justify-content:space-between}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.receipt-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;
              background:#fafafa;display:flex;flex-direction:column}
.receipt-img{width:100%;height:200px;object-fit:cover;cursor:zoom-in;border-bottom:1px solid var(--border)}
.receipt-info{padding:10px;font-size:13px;flex:1}
.amount-input{width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;
              font-weight:bold;text-align:right}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;
       align-items:center;justify-content:center}
#modal img{max-width:90%;max-height:90%;border-radius:8px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
.summary-card{background:white;border-radius:12px;padding:15px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.summary-val{font-size:24px;font-weight:bold;color:var(--primary)}
</style>
</head>
<body>

<header class="header">
  <div class="header-title">会社経費 管理ダッシュボード</div>
  <div style="display:flex;gap:8px">
    <a href="guide_admin.html" class="btn" style="background:#1e3a5f;color:white;text-decoration:none">使い方</a>
    <button class="btn btn-success" onclick="exportJDL()">JDL形式CSV出力</button>
    <button class="btn btn-danger"  onclick="clearAll()">リセット</button>
  </div>
</header>

<div style="max-width:1200px;margin:0 auto;padding:0 20px">

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInp').click()">
    <input type="file" id="fileInp" multiple accept=".json" style="display:none" onchange="loadFiles(this.files)">
    <div style="font-size:40px;margin-bottom:10px">📤</div>
    <h3>社員から送られた申請JSONをここにドロップ</h3>
    <p style="color:#6b7280;margin-top:8px;font-size:14px">または クリックしてファイルを選択</p>
  </div>

  <div class="summary-grid" id="summaryDashboard"></div>
  <div id="board"></div>
</div>

<div id="modal" onclick="this.style.display='none'">
  <img id="modalImg" alt="レシート拡大">
</div>

<script>
// ================================================================
// カテゴリマスタ（借方科目・補助の対応）
// ================================================================
// 大項目=借方科目名称(JDL短名称)  中項目=借方補助名称  (20260420更新版スペックに準拠)
const CAT_MAP = {
  '駐車場代':     { account:'旅費交通', sub:'駐車場代',     taxArea:'仕入'   },
  '仕入高':       { account:'仕入高',   sub:'',             taxArea:'仕入'   },
  'ガソリン':     { account:'車両費',   sub:'ガソリン',     taxArea:'仕入'   },
  '車両関係費':   { account:'車両費',   sub:'車両関係費',   taxArea:'仕入'   },
  '消耗品費':     { account:'消耗品費', sub:'',             taxArea:'仕入'   },
  '事務用品':     { account:'事務用品', sub:'',             taxArea:'仕入'   },
  '運賃':         { account:'運賃',     sub:'',             taxArea:'仕入'   },
  'その他交通費': { account:'旅費交通', sub:'その他交通費', taxArea:'仕入'   },
  '有料道路':     { account:'旅費交通', sub:'有料道路',     taxArea:'仕入'   },
  '会議費':       { account:'会議費',   sub:'',             taxArea:'仕入'   },
  '交際費':       { account:'交際費',   sub:'',             taxArea:'仕入'   },
  '水道光熱':     { account:'水道光熱', sub:'',             taxArea:'仕入'   },
  '租税公課':     { account:'租税公課', sub:'',             taxArea:'対象外' },
  '福利厚生':     { account:'福利厚生', sub:'',             taxArea:'仕入'   },
};

// ================================================================
// 状態
// ================================================================
let masterData = (() => { try { return JSON.parse(localStorage.getItem('mgr_v6_data') || '[]'); } catch { return []; } })();
document.addEventListener('DOMContentLoaded', renderBoard);

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.style.background='#eff6ff'; });
dz.addEventListener('dragleave', ()=> { dz.style.background='white'; });
dz.addEventListener('drop',      e => { e.preventDefault(); dz.style.background='white'; loadFiles(e.dataTransfer.files); });

// ================================================================
// JSONファイル読み込み
// ================================================================
async function loadFiles(files) {
  for (const f of files) {
    if (!f.name.endsWith('.json')) continue;
    try {
      const json = JSON.parse(await f.text());
      const name = json.name || '不明';
      (json.expenses || []).forEach(e => {
        if (!masterData.some(m => m.id === e.id)) masterData.push({ ...e, name });
      });
    } catch(err) { console.error(err); alert(`${f.name} の読み込みに失敗しました。正しいJSONファイルか確認してください。`); }
  }
  saveAndRender();
}

function saveAndRender() {
  try { localStorage.setItem('mgr_v6_data', JSON.stringify(masterData)); }
  catch { console.warn('localStorage capacity reached'); }
  renderBoard();
}

// ================================================================
// 画面描画
// ================================================================
function renderBoard() {
  const board = document.getElementById('board');
  const dash  = document.getElementById('summaryDashboard');
  if (!masterData.length) { board.innerHTML=''; dash.innerHTML=''; return; }

  const total  = masterData.reduce((s,i) => s + (Number(i.amount)||0), 0);
  const people = [...new Set(masterData.map(i=>i.name))].length;

  dash.innerHTML = `
    <div class="summary-card"><div>合計金額</div><div class="summary-val">¥${total.toLocaleString()}</div></div>
    <div class="summary-card"><div>申請人数</div><div class="summary-val">${people}名</div></div>
    <div class="summary-card"><div>証跡枚数</div><div class="summary-val">${masterData.length}枚</div></div>`;

  const grouped = {};
  masterData.forEach(i => { (grouped[i.name] = grouped[i.name]||[]).push(i); });

  board.innerHTML = Object.entries(grouped).map(([name, items]) => {
    const pTotal = items.reduce((s,i)=>s+(Number(i.amount)||0), 0);

    // 月ごとにグループ分け
    const byMonth = {};
    items.forEach(i => {
      const ym = (i.date||'').slice(0,7); // "YYYY-MM"
      (byMonth[ym] = byMonth[ym]||[]).push(i);
    });
    const sortedMonths = Object.keys(byMonth).sort();

    const monthSections = sortedMonths.map(ym => {
      const mItems = byMonth[ym];
      const mTotal = mItems.reduce((s,i)=>s+(Number(i.amount)||0), 0);
      const label  = ym ? ym.replace('-','年') + '月分' : '日付不明';
      return `
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;
                      background:#f3f4f6;border-radius:6px;padding:6px 12px;margin-bottom:10px">
            <span style="font-size:13px;font-weight:700;color:#374151">📅 ${label}　${mItems.length}件</span>
            <span style="font-size:13px;font-weight:700;color:#2563eb">¥${mTotal.toLocaleString()}</span>
          </div>
          <div class="gallery">
            ${mItems.map(i => `
              <div class="receipt-card">
                ${i.img
                  ? `<img src="${i.img}" class="receipt-img" onclick="zoomThis(this)" alt="レシート">`
                  : `<div class="receipt-img" style="display:flex;align-items:center;justify-content:center;font-size:48px;background:#f9fafb">🧾</div>`
                }
                <div class="receipt-info">
                  <div style="font-size:11px;color:#666">${i.date}</div>
                  <div style="font-weight:bold;margin:4px 0">${esc(i.store)||'店名なし'}</div>
                  <input type="number" class="amount-input" value="${i.amount}"
                         onchange="updateAmt(${i.id}, this.value)">
                  <div style="font-size:11px;color:var(--primary);margin-top:4px">${esc(i.category)} · ${i.tax||'10'}%</div>
                  ${i.motouke||i.genba
                    ? `<div style="font-size:11px;color:#16a34a;margin-top:2px">${esc(i.motouke)} / ${esc(i.genba)}</div>` : ''}
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="person-section">
        <div class="person-header">
          <span>👤 ${esc(name)} （${items.length}件）</span>
          <span>計 ¥${pTotal.toLocaleString()}</span>
        </div>
        ${monthSections}
      </div>`;
  }).join('');
}

function updateAmt(id, val) {
  const num = Number(val);
  if (isNaN(num) || num <= 0) return;
  const item = masterData.find(i => i.id === id);
  if (!item) return;
  item.amount = num;
  try { localStorage.setItem('mgr_v6_data', JSON.stringify(masterData)); }
  catch { console.warn('localStorage capacity reached'); }
  // 合計だけ更新（全体再描画しない→フォーカスが外れない）
  const total = masterData.reduce((s,i) => s + (Number(i.amount)||0), 0);
  const sv = document.querySelector('.summary-val');
  if (sv) sv.textContent = '¥' + total.toLocaleString();
}

function zoomThis(el) {
  document.getElementById('modalImg').src = el.src;
  document.getElementById('modal').style.display = 'flex';
}

function clearAll() {
  if (confirm('全データを削除しますか？')) { masterData=[]; saveAndRender(); }
}

// ================================================================
// JDL形式 CSV 出力
// 列順: 識別フラグ,伝番,日付,借方科目,借方科目名称,借方科目正式名称,借方補助,借方補助名称,
//       借方課区,借方税区,借方税入力方法,借方金額,借方消費税,
//       貸方科目,貸方科目名称,貸方科目正式名称,貸方補助,貸方補助名称,
//       貸方課区,貸方税区,貸方税入力方法,貸方金額,貸方消費税,
//       摘要,借方取引科目,貸方取引科目,
//       借方部門コード,借方部門名称,貸方部門コード,貸方部門名称
// ================================================================
function exportJDL() {
  if (!masterData.length) return alert('データがありません');

  // 会計年度を自動判定(4/1～翌3/31)
  const dates = masterData.map(e => e.date).filter(Boolean).sort();
  const firstDate = new Date(dates[0] || new Date());
  const fyStartYear = firstDate.getMonth() >= 3 ? firstDate.getFullYear() : firstDate.getFullYear() - 1;
  const fyStart = `${fyStartYear}0401`;
  const fyEnd   = `${fyStartYear + 1}0331`;
  const reiwaY  = (fyStartYear + 1) - 2018;   // 決算年(令和N年) = FY末の西暦 - 2018

  // 30列の空行(カンマ29個)に揃えるユーティリティ
  const pad30 = str => {
    const commasNeeded = 29 - (str.match(/,/g) || []).length;
    return str + (commasNeeded > 0 ? ','.repeat(commasNeeded) : '');
  };

  // ===== 先頭3行(コメント+空行) + 4行目に列タイトル =====
  const rows = [
    pad30(`// 0002 株式会社グローライズ 令和 ${reiwaY}年 3月31日決算`),
    pad30(`// 出力期間 ： ${fyStart} ～ ${fyEnd} `),
    ','.repeat(29),
    '//識別フラグ,伝番,日付,借方科目,借方科目名称,借方科目正式名称,借方補助,借方補助名称,借方課区,借方税区,借方税入力方法,借方金額,借方消費税,貸方科目,貸方科目名称,貸方科目正式名称,貸方補助,貸方補助名称,貸方課区,貸方税区,貸方税入力方法,貸方金額,貸方消費税,摘要,借方取引科目,貸方取引科目,借方部門コード,借方部門名称,貸方部門コード,貸方部門名称',
  ];

  // CSVフィールドをエスケープ(カンマ・改行・"を含むときだけ引用符で囲む)
  const f = v => {
    const s = String(v == null ? '' : v);
    return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };

  masterData.forEach(e => {
    const cat      = CAT_MAP[e.category] || { account:e.category||'諸経費', sub:'', taxArea:'仕入' };
    const taxRate  = Number(e.tax ?? 10);
    const taxDenom = taxRate === 0 ? 1 : 100 + taxRate;
    const taxAmt   = taxRate === 0 ? 0 : Math.floor(e.amount * taxRate / taxDenom);
    // 税率0(対象外)は 課区/税区/税入力方法 をすべて空欄(サンプルCSV仕様)
    const taxLabel  = taxRate === 0 ? '' : (taxRate === 8 ? '軽減8%' : '10%');
    const taxArea   = taxRate === 0 ? '' : (cat.taxArea || '仕入');
    const taxMethod = taxRate === 0 ? '' : '内税';
    const dateJdl   = (e.date || '').replace(/-/g, '');

    // 摘要: 店名 [元請け/現場] メモ (申請者)
    let tekiyou = e.store || '';
    if (e.motouke || e.genba) tekiyou += ` [${e.motouke||''}/${e.genba||''}]`;
    if (e.memo) tekiyou += ` ${e.memo}`;
    if (e.name) tekiyou += ` (${e.name})`;

    rows.push([
      '1000',         // 1 識別フラグ
      '',             // 2 伝番(空:JDLが自動採番)
      dateJdl,        // 3 日付 YYYYMMDD
      '',             // 4 借方科目コード
      f(cat.account), // 5 借方科目名称(大項目=短名称)
      '',             // 6 借方科目正式名称(空:JDLが自動補完)
      '',             // 7 借方補助コード
      f(cat.sub),     // 8 借方補助名称(中項目)
      taxArea,        // 9 借方課区
      taxLabel,       // 10 借方税区
      taxMethod,      // 11 借方税入力方法
      e.amount,       // 12 借方金額(税込)
      taxAmt,         // 13 借方消費税
      '',             // 14 貸方科目コード
      '現金',         // 15 貸方科目名称
      '',             // 16 貸方科目正式名称(空)
      '',             // 17 貸方補助コード
      '',             // 18 貸方補助名称
      '',             // 19 貸方課区
      '',             // 20 貸方税区
      '',             // 21 貸方税入力方法
      e.amount,       // 22 貸方金額
      '',             // 23 貸方消費税
      f(tekiyou),     // 24 摘要
      '',             // 25 借方取引科目
      '',             // 26 貸方取引科目
      '',             // 27 借方部門コード
      '',             // 28 借方部門名称(空:JDL未登録部門はエラーになるため)
      '',             // 29 貸方部門コード
      '',             // 30 貸方部門名称
    ].join(','));
  });

  // ===== Shift-JIS(CP932)にエンコード =====
  const csvText = rows.join('\r\n') + '\r\n';
  let blob;
  if (typeof Encoding !== 'undefined') {
    const sjis = Encoding.convert(csvText, { to:'SJIS', from:'UNICODE', type:'array' });
    blob = new Blob([new Uint8Array(sjis)], { type:'text/csv' });
  } else {
    alert('警告: Shift-JIS変換ライブラリが読み込めませんでした。UTF-8 BOMで出力します。');
    blob = new Blob(['\uFEFF' + csvText], { type:'text/csv;charset=utf-8' });
  }

  const a       = document.createElement('a');
  const url     = URL.createObjectURL(blob);
  a.href        = url;
  const d       = new Date();
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  a.download    = `JDL取込_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s)  { return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function csv2(s) { return String(s||'').replace(/"/g, '""'); }
</script>
</body>
</html>
