<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>社長専用経費入力</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="shortcut icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="社長経費">
<meta name="mobile-web-app-capable" content="yes">
<style>
:root {
  --primary:#7c3aed;--primary-light:#f5f3ff;--success:#16a34a;
  --danger:#dc2626;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-800:#1f2937;
  --shadow:0 1px 3px rgba(0,0,0,.1);
  --r:10px;--bottom-nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f7f5fb;color:var(--gray-800);
     min-height:100vh;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom))}

.app-header{background:white;border-bottom:1px solid var(--gray-200);
            padding:0 16px;height:56px;display:flex;align-items:center;
            justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-title{font-size:16px;font-weight:700;color:var(--primary)}
.name-badge{background:var(--primary);color:white;font-size:11px;font-weight:700;
            padding:4px 10px;border-radius:12px}
.header-key-btn{font-size:11px;padding:6px 10px;border:1px solid var(--gray-200);
                border-radius:6px;background:white;color:var(--gray-500);cursor:pointer;
                white-space:nowrap;text-decoration:none}

.main{max-width:640px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px}
.card{background:white;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}

.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray-500);
            margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.form-label.req::after{content:"*";color:var(--danger);margin-left:2px}
.form-control{width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:6px;
              font-size:16px;outline:none;background:white;margin-bottom:10px;font-family:inherit}
.form-control:focus{border-color:var(--primary)}
.form-control.auto-filled{border-color:#22c55e;background:#f0fdf4}

.capture-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.capture-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
             gap:6px;padding:20px 10px;border:2px dashed var(--gray-300);border-radius:var(--r);
             background:var(--gray-50);cursor:pointer;position:relative;
             font-size:14px;font-weight:600;color:var(--gray-500)}
.capture-btn:hover{background:var(--primary-light);border-color:var(--primary)}
.capture-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.capture-btn .icon{font-size:28px}

.preview-wrap{display:none}
.preview-wrap.show{display:block}
.receipt-thumb{width:100%;border-radius:6px;border:2px solid var(--gray-200);
               overflow:hidden;margin-bottom:14px;background:#000;position:relative}
.receipt-thumb img{width:100%;max-height:300px;object-fit:contain;display:block;margin:0 auto}

.ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);
             display:none;flex-direction:column;align-items:center;justify-content:center;
             gap:10px;border-radius:4px;padding:20px}
.ocr-overlay.show{display:flex}
.ocr-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);
             border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-text{color:white;font-size:13px;font-weight:600;text-align:center}

.ocr-result-banner{display:none;padding:10px 12px;border-radius:8px;margin-bottom:12px;
                   font-size:13px;font-weight:600;line-height:1.5}
.ocr-result-banner.show{display:block}
.ocr-result-banner.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.ocr-result-banner.partial{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.ocr-result-banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

.btn{width:100%;padding:14px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer}
.btn-success{background:var(--success);color:white}
.btn-primary{background:var(--primary);color:white}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200)}

.expense-card{display:flex;align-items:center;justify-content:space-between;
              padding:12px;border-bottom:1px solid var(--gray-100)}
.expense-card.sent{background:#f9fafb;opacity:.7}
.expense-card.sent .store-name{color:var(--gray-500)}
.cat-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gray-100)}
.sent-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
            background:#dcfce7;color:#166534;margin-left:6px}

/* リスト内フィルタトグル */
.filter-tabs{display:flex;gap:4px;background:var(--gray-100);border-radius:8px;padding:3px;margin-bottom:12px}
.filter-tab{flex:1;padding:8px;border:none;background:transparent;font-size:12px;font-weight:700;
            color:var(--gray-500);border-radius:6px;cursor:pointer}
.filter-tab.active{background:white;color:var(--primary);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.filter-tab .count{font-size:10px;color:var(--gray-400);margin-left:4px;font-weight:600}
.filter-tab.active .count{color:var(--primary)}

/* 月見出し */
.month-header{display:flex;justify-content:space-between;align-items:center;
              background:#f3f4f6;border-radius:6px;padding:6px 12px;margin:10px 0 6px;font-size:12px;font-weight:700}
.month-header .m-label{color:var(--gray-800)}
.month-header .m-total{color:var(--primary)}

/* サマリータブ */
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.summary-mini-card{background:white;border-radius:8px;padding:10px;text-align:center;
                   box-shadow:var(--shadow);border:1px solid var(--gray-200)}
.summary-mini-label{font-size:10px;color:var(--gray-500);font-weight:700;margin-bottom:4px}
.summary-mini-val{font-size:15px;font-weight:700;color:var(--primary)}
.summary-mini-sub{font-size:10px;color:var(--gray-400);margin-top:2px}
.summary-section{background:white;border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.summary-section h3{font-size:14px;font-weight:700;color:var(--gray-800);margin-bottom:10px;
                    padding-bottom:6px;border-bottom:1.5px solid var(--gray-100)}
.month-row{padding:8px 0;border-bottom:1px solid var(--gray-100)}
.month-row:last-child{border-bottom:none}
.month-row-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;margin-bottom:4px}
.month-row-head .ym{color:var(--gray-800)}
.month-row-head .total{color:var(--primary)}
.cat-table{font-size:11px;color:var(--gray-500);line-height:1.6;display:grid;grid-template-columns:1fr auto;gap:0 12px}
.cat-table .cat{}
.cat-table .amt{text-align:right;color:var(--gray-800);font-variant-numeric:tabular-nums}

.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:12px}
.history-row:last-child{border-bottom:none}
.history-info{flex:1;min-width:0}
.history-when{font-weight:700;color:var(--gray-800)}
.history-sub{font-size:10px;color:var(--gray-500);margin-top:2px}
.history-total{font-weight:700;color:var(--primary);font-size:13px;white-space:nowrap;margin-left:8px}
.history-detail-btn{font-size:10px;padding:4px 8px;margin-top:4px;border:1px solid var(--gray-200);
                    background:white;color:var(--gray-500);border-radius:4px;cursor:pointer}
.empty-msg{text-align:center;padding:30px 10px;color:var(--gray-400);font-size:13px}

/* 支払元・按分セクション */
.pay-section{background:#fef3c7;padding:12px;border-radius:8px;margin-bottom:10px;border:1.5px solid #fcd34d}
.pay-section.alloc{background:#ede9fe;border-color:#c4b5fd}
.pay-row{display:flex;gap:6px;flex-wrap:wrap}
.pay-chip{flex:1;min-width:90px;padding:10px;border:1.5px solid var(--gray-300);border-radius:8px;
          background:white;text-align:center;font-size:13px;font-weight:700;cursor:pointer;user-select:none}
.pay-chip.active{border-color:var(--primary);background:var(--primary);color:white}


.alloc-mode{display:flex;gap:6px;margin:8px 0}
.alloc-mode-btn{flex:1;padding:8px;border:1.5px solid var(--gray-300);border-radius:6px;
                background:white;font-size:12px;font-weight:700;cursor:pointer}
.alloc-mode-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}

.alloc-company{display:grid;grid-template-columns:auto 1fr 90px 80px;gap:8px;
               align-items:center;padding:8px 6px;border-bottom:1px solid var(--gray-100)}
.alloc-company:last-child{border-bottom:none}
.alloc-company input[type=checkbox]{width:20px;height:20px;margin:0;accent-color:var(--primary)}
.alloc-company .cname{font-size:13px;font-weight:600}
.alloc-company .cinput{width:100%;padding:6px;border:1px solid var(--gray-300);border-radius:4px;
                        font-size:14px;text-align:right;margin:0}
.alloc-company .cinput:disabled{background:#f3f4f6;color:#9ca3af}
.alloc-company .cside{font-size:11px;color:var(--gray-500);text-align:right}

.alloc-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.alloc-btn-small{padding:8px 12px;border:1.5px solid var(--gray-300);border-radius:6px;
                 background:white;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.alloc-btn-small:active{background:var(--gray-100)}
.alloc-recent{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.alloc-recent-chip{padding:6px 10px;border:1px solid var(--primary);border-radius:12px;
                   background:white;color:var(--primary);font-size:11px;font-weight:600;cursor:pointer}
.alloc-recent-chip:active{background:var(--primary-light)}

.alloc-total{margin-top:8px;padding:8px;border-radius:6px;font-size:13px;font-weight:700;text-align:center}
.alloc-total.ok{background:#dcfce7;color:#166534}
.alloc-total.ng{background:#fee2e2;color:#991b1b}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;
            height:calc(var(--bottom-nav-h) + var(--safe-bottom));
            background:white;border-top:1px solid var(--gray-200);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
         font-size:10px;font-weight:600;color:var(--gray-400);background:none;border:none;gap:2px}
.nav-btn.active{color:var(--primary)}
</style>
</head>
<body>

<header class="app-header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="app-title">社長専用経費入力</div>
    <span class="name-badge">小林社長</span>
  </div>
  <a href="guide_president.html" class="header-key-btn">使い方</a>
</header>

<main class="main">
  <!-- 入力タブ -->
  <div class="tab-panel active" id="panel-input">
    <div class="card">
      <div id="uploadSection">
        <div class="capture-btns">
          <label class="capture-btn">
            <input type="file" accept="image/*" capture="environment" onchange="handleFile(this.files[0])">
            <span class="icon">📸</span>
            <span>カメラで撮影</span>
          </label>
          <label class="capture-btn">
            <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
            <span class="icon">🖼️</span>
            <span>写真を選択</span>
          </label>
        </div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <div class="receipt-thumb">
          <img id="receiptImg" src="" alt="レシート">
          <div class="ocr-overlay" id="ocrOverlay">
            <div class="ocr-spinner"></div>
            <div class="ocr-text" id="ocrStatusText">AI で解析中...</div>
          </div>
        </div>

        <div class="ocr-result-banner" id="ocrResultBanner"></div>

        <div id="formGrid">
          <label class="form-label req">日付</label>
          <input type="date" class="form-control" id="fDate">

          <label class="form-label req">金額（税込）</label>
          <input type="number" class="form-control" id="fAmount" placeholder="0" inputmode="numeric">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div>
              <label class="form-label">税率</label>
              <select class="form-control" id="fTax">
                <option value="10">10%</option>
                <option value="8">軽減8%（飲食）</option>
                <option value="0">対象外</option>
              </select>
            </div>
            <div>
              <label class="form-label">項目</label>
              <select class="form-control" id="fCategory">
                <option value="会議費">🍵 会議費 (社内飲食)</option>
                <option value="交際費">🍺 交際費 (社外飲食)</option>
                <option value="駐車場代">🅿️ 駐車場代 (パーキング)</option>
                <option value="事務用品">✏️ 事務用品</option>
                <option value="消耗品費">📦 消耗品費 (材料以外)</option>
                <option value="その他交通費">🚕 その他交通費 (タクシー等)</option>
                <option value="有料道路">🛣️ 有料道路 (高速道路代)</option>
                <option value="ガソリン">⛽ ガソリン (車両費)</option>
                <option value="車両関係費">🔧 車両関係費 (修理・車用品)</option>
                <option value="仕入高">🔧 仕入高 (材料・部品・工具)</option>
                <option value="運賃">🚚 運賃 (宅急便など)</option>
                <option value="水道光熱">💡 水道光熱</option>
                <option value="租税公課">🏷️ 租税公課 (印紙など)</option>
                <option value="福利厚生">🩺 福利厚生</option>
              </select>
            </div>
          </div>

          <label class="form-label req">店名・購入場所</label>
          <input type="text" class="form-control" id="fStore" placeholder="例：コーナン">

          <!-- 支払元 -->
          <div class="pay-section">
            <label class="form-label req" style="color:#92400e">💳 支払元</label>
            <div class="pay-row" id="paySourceRow">
              <div class="pay-chip" data-source="現金" onclick="setPaySource('現金')">💴 現金</div>
              <div class="pay-chip" data-source="GRアメックス" onclick="setPaySource('GRアメックス')">💳 GR</div>
              <div class="pay-chip" data-source="GRHDアメックス" onclick="setPaySource('GRHDアメックス')">💳 GRHD</div>
            </div>
          </div>

          <!-- 按分(任意: 会社をチェックすれば按分、チェックなしなら按分なし) -->
          <div class="pay-section alloc">
            <label class="form-label" style="color:#5b21b6">🏢 按分（必要な時だけチェック）</label>
            <div style="font-size:11px;color:#6b7280;margin-bottom:8px">
              会社を選ばずに保存 → 按分なし（普通の経費）<br>
              会社をチェックして%入力 → 按分あり
            </div>

            <div class="alloc-mode">
              <button type="button" class="alloc-mode-btn active" id="modeBtn-pct" onclick="setAllocMode('pct')">％指定</button>
              <button type="button" class="alloc-mode-btn" id="modeBtn-amt" onclick="setAllocMode('amt')">金額指定</button>
            </div>

            <div id="allocList"></div>

            <div class="alloc-recent" id="allocRecent" style="display:none"></div>

            <div class="alloc-actions">
              <button type="button" class="alloc-btn-small" onclick="allocEqualSplit()">⚖ 均等割</button>
              <button type="button" class="alloc-btn-small" onclick="allocClear()">🗑 クリア</button>
            </div>

            <div class="alloc-total" id="allocTotal" style="display:none"></div>
          </div>

          <label class="form-label">メモ</label>
          <input type="text" class="form-control" id="fMemo" placeholder="任意">

          <button class="btn btn-success" onclick="saveExpense()">保存して次へ</button>
          <button class="btn btn-ghost" style="margin-top:8px" onclick="resetForm()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- リストタブ -->
  <div class="tab-panel" id="panel-list" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;align-items:center">
        <span style="font-weight:bold">経費リスト</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <button class="btn btn-success"
                  style="width:auto;padding:8px 16px;font-size:12px;background:var(--primary)"
                  onclick="sendToDrive()">📤 管理者に送信</button>
          <button onclick="exportJSON()"
                  style="font-size:10px;color:var(--gray-400);background:none;border:none;cursor:pointer;padding:0">
            ファイルで出力（バックアップ）
          </button>
        </div>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" id="filter-unsent" onclick="setListFilter('unsent')">
          未送信<span class="count" id="cnt-unsent">0</span>
        </button>
        <button class="filter-tab" id="filter-sent" onclick="setListFilter('sent')">
          送信済み<span class="count" id="cnt-sent">0</span>
        </button>
      </div>

      <div id="expenseCards"></div>

      <div id="sentActions" style="display:none;margin-top:14px;padding-top:12px;border-top:1px solid var(--gray-200)">
        <button onclick="clearSent()" class="btn btn-ghost" style="font-size:12px;padding:10px">
          🗑 送信済みをすべて削除
        </button>
      </div>
    </div>
  </div>

  <!-- サマリータブ -->
  <div class="tab-panel" id="panel-summary" style="display:none">
    <div class="summary-cards" id="summaryCards"></div>

    <div class="summary-section">
      <h3>📅 月別合計（保存済み＋送信済み）</h3>
      <div id="monthlyBreakdown"></div>
    </div>

    <div class="summary-section">
      <h3>📤 送信履歴</h3>
      <div id="sendHistoryList"></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-in" onclick="switchTab('input',this)">
    <span style="font-size:20px">📝</span>入力
  </button>
  <button class="nav-btn" id="nav-li" onclick="switchTab('list',this)">
    <span style="font-size:20px">📋</span>リスト
  </button>
  <button class="nav-btn" id="nav-su" onclick="switchTab('summary',this)">
    <span style="font-size:20px">📊</span>サマリー
  </button>
</nav>

<!-- 送信履歴の詳細モーダル -->
<div id="historyDetailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:12px"
     onclick="if(event.target===this)closeHistoryDetail()">
  <div style="background:white;border-radius:12px;max-width:520px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--gray-200)">
      <b id="historyDetailTitle">送信内容</b>
      <button onclick="closeHistoryDetail()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#666">✕</button>
    </div>
    <div id="historyDetailBody" style="overflow-y:auto;padding:12px 16px;font-size:13px"></div>
  </div>
</div>

<script>
// ================================================================
// 社長専用：固定氏名 + 会社/支払元定義
// ================================================================
const FIXED_NAME = '小林社長';

// 按分対象会社(6社。順序は表示順)
const COMPANIES = ['グローライズ', 'GRHD', '和信カインド', 'ビジネスサポート', 'ラーテル', 'GRミツマ'];

// 支払元の選択肢
const PAY_SOURCES = ['現金', 'GRアメックス', 'GRHDアメックス'];

// 最近の按分パターンを保持するキー(直近3件)
const RECENT_ALLOC_KEY = 'pres_recent_alloc_v1';

// カテゴリマスタ(借方科目・補助との対応)
const CAT_MAP = {
  '駐車場代':     { account:'旅費交通', sub:'駐車場代',     tax:'10' },
  '仕入高':       { account:'仕入高',   sub:'',             tax:'10' },
  'ガソリン':     { account:'車両費',   sub:'ガソリン',     tax:'10' },
  '車両関係費':   { account:'車両費',   sub:'車両関係費',   tax:'10' },
  '消耗品費':     { account:'消耗品費', sub:'',             tax:'10' },
  '事務用品':     { account:'事務用品', sub:'',             tax:'10' },
  '運賃':         { account:'運賃',     sub:'',             tax:'10' },
  'その他交通費': { account:'旅費交通', sub:'その他交通費', tax:'10' },

function setAllocMode(mode) {

function renderAllocList() {
  const total = Number(document.getElementById('fAmount')?.value || 0);
  const html = COMPANIES.map(c => {
    const d = allocData[c] || { checked: false, value: 0 };
    const checkedAttr = d.checked ? 'checked' : '';
    const disabledAttr = d.checked ? '' : 'disabled';
    const unit = allocMode === 'pct' ? '%' : '円';
    const val = d.checked ? (d.value || '') : '';
    // 反対単位での表示
    let sideText = '-';
    if (d.checked && total > 0) {
      if (allocMode === 'pct' && d.value) {
        sideText = '¥' + Math.round(total * Number(d.value) / 100).toLocaleString();
      } else if (allocMode === 'amt' && d.value) {
        sideText = (Number(d.value) / total * 100).toFixed(1) + '%';
      }
    }
    return `
      <div class="alloc-company">
        <input type="checkbox" id="alc-${c}" ${checkedAttr} onchange="toggleAlloc('${c}', this.checked)">
        <label for="alc-${c}" class="cname">${esc(c)}</label>
        <input type="number" class="cinput" id="ali-${c}" value="${val}" ${disabledAttr}
               placeholder="0" min="0" step="${allocMode === 'pct' ? 1 : 100}"
               oninput="setAllocValue('${c}', this.value)">
        <div class="cside">${sideText === '-' ? unit : sideText}</div>
      </div>`;
  }).join('');
  document.getElementById('allocList').innerHTML = html;
  updateAllocTotal();
}

function toggleAlloc(company, checked) {
  allocData[company] = allocData[company] || { checked: false, value: 0 };
  allocData[company].checked = checked;
  if (!checked) allocData[company].value = 0;
  renderAllocList();
}

function setAllocValue(company, value) {
  allocData[company] = allocData[company] || { checked: true, value: 0 };
  allocData[company].value = Number(value) || 0;

  const total = Number(document.getElementById('fAmount').value || 0);
  const curVal = Number(value) || 0;

  // 入力した会社以外のチェック中の会社に、残りを均等分配(端数は最後の1社に寄せる)
  const others = Object.entries(allocData)
    .filter(([c, d]) => d.checked && c !== company)
    .map(([c, _]) => c);

  if (others.length >= 1) {
    let remainder;
    if (allocMode === 'pct') remainder = Math.max(0, 100 - curVal);
    else                     remainder = Math.max(0, total - curVal);
    const base = Math.floor(remainder / others.length);
    const extra = remainder - base * others.length;  // 端数
    // 端数はGRHDに寄せる(GRHDが他社リストに無ければ最後の社へ)
    const grhdIdx = others.indexOf('GRHD');
    const extraIdx = grhdIdx >= 0 ? grhdIdx : others.length - 1;
    others.forEach((otherC, idx) => {
      const val = base + (idx === extraIdx ? extra : 0);
      allocData[otherC].value = val;
      const otherInput = document.querySelector(`#ali-${CSS.escape(otherC)}`);
      if (otherInput) otherInput.value = val;
      const otherSide = document.querySelector(`#alc-${CSS.escape(otherC)}`).closest('.alloc-company').querySelector('.cside');
      if (otherSide) {
        if (total > 0 && val > 0) {
          if (allocMode === 'pct') otherSide.textContent = '¥' + Math.round(total * val / 100).toLocaleString();
          else                     otherSide.textContent = (val / total * 100).toFixed(1) + '%';
        } else {
          otherSide.textContent = allocMode === 'pct' ? '%' : '円';
        }
      }
    });
  }

  updateAllocTotal();
  // 自分側の単位表示更新(フォーカス維持のため部分更新)
  const sideEl = document.querySelector(`#alc-${CSS.escape(company)}`).closest('.alloc-company').querySelector('.cside');
  if (total > 0 && curVal > 0) {
    if (allocMode === 'pct') sideEl.textContent = '¥' + Math.round(total * curVal / 100).toLocaleString();
    else                     sideEl.textContent = (curVal / total * 100).toFixed(1) + '%';
  } else {
    sideEl.textContent = allocMode === 'pct' ? '%' : '円';
  }
}

function updateAllocTotal() {
  const total = Number(document.getElementById('fAmount')?.value || 0);
  const el = document.getElementById('allocTotal');
  if (!el) return;
  const entries = Object.entries(allocData).filter(([_, d]) => d.checked);
  // 何もチェックされてない時は合計を非表示(按分なし状態)
  if (entries.length === 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  const sum = entries.reduce((s, [_, d]) => s + (Number(d.value) || 0), 0);
  if (allocMode === 'pct') {
    const ok = Math.abs(sum - 100) < 0.01;
    el.className = 'alloc-total ' + (ok ? 'ok' : 'ng');
    el.innerHTML = ok
      ? `合計: <b>${sum.toFixed(1)}%</b> ✅`
      : `合計: <b>${sum.toFixed(1)}%</b> (残り ${(100 - sum).toFixed(1)}%)`;
  } else {
    const ok = total > 0 && sum === total;
    el.className = 'alloc-total ' + (ok ? 'ok' : 'ng');
    el.innerHTML = ok
      ? `合計: <b>¥${sum.toLocaleString()}</b> ✅`
      : `合計: <b>¥${sum.toLocaleString()}</b> / ¥${total.toLocaleString()} (差額 ¥${(total - sum).toLocaleString()})`;
  }
}

function allocEqualSplit() {
  const entries = Object.entries(allocData).filter(([_, d]) => d.checked);
  if (!entries.length) return alert('まず会社を1社以上チェックしてください');
  const total = Number(document.getElementById('fAmount').value || 0);
  const n = entries.length;
  if (allocMode === 'pct') {
    const base = Math.floor(100 / n);
    const remainder = 100 - base * n;
    entries.forEach(([c, _], i) => {
      allocData[c].value = base + (i === 0 ? remainder : 0);  // 余りは最初の社
    });
  } else {
    if (total <= 0) return alert('先に金額を入力してください');
    const base = Math.floor(total / n);
    const remainder = total - base * n;
    entries.forEach(([c, _], i) => {
      allocData[c].value = base + (i === 0 ? remainder : 0);
    });
  }
  renderAllocList();
}

// ================================================================
// OCR(Cloudflare Worker → Groq AI 経由)
// ================================================================
const WORKER_URL = 'https://keihi-ocr.akirasp4.workers.dev';

async function runOCR(imgSrc) {
  const overlay   = document.getElementById('ocrOverlay');
  const statusTxt = document.getElementById('ocrStatusText');
  overlay.classList.add('show');
  statusTxt.textContent = '解析中...';
  hideBanner();

  const b64      = imgSrc.split(',')[1];
  const mimeType = imgSrc.split(';')[0].split(':')[1] || 'image/jpeg';

  const body = JSON.stringify({
    contents: [{
      parts: [
        { inlineData: { mimeType, data: b64 } },
        { text: `このレシート・領収書から情報を抽出し、必ずJSON形式のみで回答してください。

抽出項目：
- date: 日付（YYYY-MM-DD形式）
  ※「令和」「平成」と明記されている場合のみ和暦→西暦に変換してください。
  ※「26年4月17日」のように元号の記載がない2桁年は、西暦2000年代として扱ってください(例: "26年" → "2026", "25年" → "2025")。
  ※「2026/4/17」「2026-04-17」など西暦4桁はそのまま使ってください。
- amount: 税込合計金額（整数。記号・カンマ不要）
- store: 店名・会社名（先頭に多い固有名詞）
- tax_rate: 税率（"10" または "8" または "0"。軽減税率マークがあれば "8"）

例：{"date":"2026-03-18","amount":1500,"store":"コーナン","tax_rate":"10"}
読み取れない項目はnullにしてください。` }
      ]
    }],
    generationConfig: { temperature: 0 }
  });

  try {
    const res  = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body
    });
    const data = await res.json();
    overlay.classList.remove('show');

    if (!res.ok) {
      const msg = data?.error?.message || `HTTP ${res.status}`;
      showBanner('error', `読み取りエラー: ${msg}<br><span style="font-size:11px;font-weight:normal">しばらく待ってから再試行してください</span>`);
      return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || '';
    if (!jsonStr) { showBanner('error', 'レシート情報を抽出できませんでした。手動で入力してください。'); return; }

    let parsed;
    try { parsed = JSON.parse(jsonStr); }
    catch { showBanner('error', 'レスポンスの解析に失敗しました。手動で入力してください。'); return; }

    const count = applyParsedData(parsed);
    if      (count >= 3) showBanner('success', `${count}項目を自動入力しました。内容を確認してください。`);
    else if (count >= 1) showBanner('partial', `${count}項目を入力しました。残りは手動で補完してください。`);
    else                 showBanner('error',   'レシート情報を特定できませんでした。手動で入力してください。');

  } catch (err) {
    overlay.classList.remove('show');
    showBanner('error', `通信エラー: ${err.message}`);
    console.error('[OCR]', err);
  }
}

function applyParsedData(parsed) {
  let count = 0;
  const valid = v => v !== null && v !== undefined && String(v) !== 'null' && String(v) !== '';
  if (valid(parsed.date))     { setField('fDate',   parsed.date);   count++; }
  if (valid(parsed.amount) && Number(parsed.amount) > 0) { setField('fAmount', parsed.amount); count++; }
  if (valid(parsed.store))    { setField('fStore',  parsed.store);  count++; }
  if (valid(parsed.tax_rate)) {
    const el = document.getElementById('fTax');
    if (['10','8','0'].includes(String(parsed.tax_rate))) { el.value = String(parsed.tax_rate); count++; }
  }
  return count;
}

function setField(id, value) {
  const el = document.getElementById(id);
  el.value = value;
  el.classList.add('auto-filled');
  el.addEventListener('input', () => el.classList.remove('auto-filled'), { once:true });
}

async function saveExpense() {
  const date   = document.getElementById('fDate').value;

  const store  = document.getElementById('fStore').value.trim();
  const cat    = document.getElementById('fCategory').value;

  const allocations = buildAllocations(amount);
  if (!allocations) return;  // エラー内で alert 済

  // 重複チェック(日付・金額・店名が全て同じ)
  const isDup = expenses.some(e =>

  );
  if (isDup && !confirm(`同じレシートが既に保存されています。\n（${date} / ¥${amount.toLocaleString()} / ${store}）\n\n続けて保存しますか？`)) return;

  const taxRate = document.getElementById('fTax').value;

  expenses.unshift({
    id:        Date.now(),

    amount,
    store,
    category:  cat,
    account:   catInfo.account,
    sub:       catInfo.sub,
    tax:       taxRate,
    motouke:   '',              // 社長用は元請けなし

    memo:      document.getElementById('fMemo').value.trim(),
    name:      FIXED_NAME,      // ★固定: 小林社長
    img:       thumb,
    // ★社長専用フィールド

    sentAt:    null,
  });
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
  } catch {

    localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    alert('画像の保存容量が上限に達したため、今回は画像なしで保存しました。');
  }
  // 按分パターンを「最近」に記録(2社以上の按分の時のみ)

// 按分データを構築 & バリデーション
// 成功: [] (按分しない) または [{ company, percent, amount }, ...] (按分する)
// 失敗: alert してから null 返す
function buildAllocations(total) {
  // 1社もチェックされてない → 按分しない(空配列)
  const anyChecked = Object.values(allocData).some(d => d.checked);
  if (!anyChecked) return [];

  // 按分する
  const entries = Object.entries(allocData).filter(([_, d]) => d.checked && Number(d.value) > 0);
  if (!entries.length) { alert('🏢 按分する会社を1社以上選択し、%を入力してください'); return null; }

  const values = entries.map(([c, d]) => ({ company: c, value: Number(d.value) }));
  const sum = values.reduce((s, v) => s + v.value, 0);

  if (allocMode === 'pct') {
    // 合計100%チェック(許容誤差 0.1%)
    if (Math.abs(sum - 100) > 0.1) {
      alert(`按分合計が ${sum.toFixed(1)}% です。100% になるよう調整してください。`);
      return null;
    }
    // %→¥変換。端数はGRHDに寄せる(無ければ最後の会社)
    const grhdIdx = values.findIndex(v => v.company === 'GRHD');
    const absorbIdx = grhdIdx >= 0 ? grhdIdx : values.length - 1;
    let acc = 0;
    const amounts = new Array(values.length);
    values.forEach((v, i) => {
      if (i === absorbIdx) return;
      amounts[i] = Math.floor(total * v.value / 100);
      acc += amounts[i];
    });
    amounts[absorbIdx] = total - acc;
    return values.map((v, i) => ({
      company: v.company,
      percent: Number(v.value),
      amount:  amounts[i],
    }));
  } else {
    // 金額モード: 合計=総額 必須
    if (sum !== total) {
      alert(`按分合計 ¥${sum.toLocaleString()} と総額 ¥${total.toLocaleString()} が一致しません。`);
      return null;
    }
    return values.map(v => ({
      company: v.company,
      percent: Number((v.value / total * 100).toFixed(2)),
      amount:  v.value,
    }));
  }
}

      <div class="expense-card${e.sent ? ' sent' : ''}">
        <div style="flex:1;min-width:0">
          <div class="store-name" style="font-weight:bold;font-size:14px">
            ${esc(e.store)}${e.sent ? '<span class="sent-badge">✅ 送信済み</span>' : ''}
          </div>
          <div style="font-size:11px;color:#666">
            ${e.date} · <span class="cat-badge">${esc(e.category)}</span>
          </div>
          ${paySrcLabel ? `<div style="font-size:11px;color:#92400e;margin-top:2px">${paySrcLabel}</div>` : ''}
          ${allocLabel ? `<div style="font-size:11px;color:#5b21b6;margin-top:2px">🏢 ${esc(allocLabel)}</div>` : ''}
          ${e.memo ? `<div style="font-size:11px;color:#888;margin-top:2px">${esc(e.memo)}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div style="font-weight:bold;color:var(--primary);font-size:16px">¥${(Number(e.amount)||0).toLocaleString()}</div>
          <div style="font-size:11px;color:#666">${e.tax||'10'}%</div>
          <button onclick="del(${e.id})"
                  style="font-size:10px;color:var(--danger);border:none;background:none;padding:4px">
            削除
          </button>
        </div>
      </div>`;
    }).join('');

    return `
      <div class="month-header">
        <span class="m-label">📅 ${label}　${monthItems.length}件</span>
        <span class="m-total">¥${monthTotal.toLocaleString()}</span>
      </div>
      ${cards}`;
  }).join('');
}

function del(id) {
  const item = expenses.find(e => e.id === id);
  const warn = item && item.sent ? '\n（送信済みのデータです。送信履歴には残ります）' : '';
  if (!confirm('削除しますか？' + warn)) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
  renderList();
}

function clearSent() {
  const n = expenses.filter(e => e.sent).length;
  if (!n) return;
  if (!confirm(`送信済みの ${n}件 を削除しますか？\n（送信履歴は残ります）`)) return;
  expenses = expenses.filter(e => !e.sent);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
  renderList();
}

async function sendToDrive() {
  const unsent = expenses.filter(e => !e.sent);
  if (!unsent.length) return alert('未送信の経費がありません');

  const btn = document.querySelector('[onclick="sendToDrive()"]');
  btn.textContent = '送信中...';
  btn.disabled = true;

  try {
    const res = await fetch(WORKER_URL + '/drive', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: FIXED_NAME, expenses: unsent }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '送信失敗');

    const now = Date.now();
    const sentIds = new Set(unsent.map(e => e.id));
    expenses.forEach(e => { if (sentIds.has(e.id)) { e.sent = true; e.sentAt = now; } });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));

    recordSendHistory(FIXED_NAME, unsent, now);

    const msg = `✅ Googleドライブへ ${unsent.length}件 送信しました！\n\n` +
                `📋 送信済みは「送信済み」タブに残ります\n` +
                `📊 履歴は「サマリー」タブで確認できます\n\n` +
                `今すぐ送信済みを削除しますか？`;
    if (confirm(msg)) {
      expenses = expenses.filter(e => !e.sent);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    }
    setListFilter('unsent');
    renderList();
  } catch(err) {
    alert('送信に失敗しました。\n' + err.message);
  } finally {
    btn.textContent = '📤 管理者に送信';
    btn.disabled = false;
  }
}

// 送信履歴に追記 (画像なし=容量節約、社長専用フィールドも保持)
function recordSendHistory(name, items, sentAt) {
  const slim = items.map(e => ({
    id: e.id, date: e.date, amount: Number(e.amount) || 0,
    store: e.store, category: e.category, tax: e.tax, memo: e.memo,
    paymentSource: e.paymentSource,
    allocations: e.allocations,
  }));
  sendHistory.unshift({
    sentAt,
    name,
    count: items.length,
    total: items.reduce((s, e) => s + (Number(e.amount) || 0), 0),
    items: slim,
  });
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(sendHistory)); }
  catch { console.warn('履歴の保存に失敗 (容量上限)'); }
}

function exportJSON() {
  if (!expenses.length) return alert('データがありません');

  const blob = new Blob([JSON.stringify({ name: FIXED_NAME, expenses }, null, 2)], { type:'application/json' });
  const a    = document.createElement('a');
  const url  = URL.createObjectURL(blob);
  a.href     = url;
  a.download = `経費申請_${FIXED_NAME}_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ================================================================
// サマリータブ (月別集計 + 送信履歴)
// ================================================================
function renderSummary() {
  renderSummaryCards();
  renderMonthlyBreakdown();
  renderSendHistoryList();
}

function collectAllForSummary() {
  const byId = new Map();
  sendHistory.forEach(h => (h.items || []).forEach(e => byId.set(e.id, e)));
  expenses.forEach(e => byId.set(e.id, e));
  return [...byId.values()];
}

function renderSummaryCards() {
  const all = collectAllForSummary();
  const now = new Date();
  const thisYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prev = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevYM = `${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}`;

  const sumOf = (ym) => all
    .filter(e => (e.date||'').slice(0,7) === ym)
    .reduce((s, e) => s + (Number(e.amount)||0), 0);
  const cntOf = (ym) => all.filter(e => (e.date||'').slice(0,7) === ym).length;

  const thisTotal = sumOf(thisYM);
  const prevTotal = sumOf(prevYM);
  const allTotal  = all.reduce((s, e) => s + (Number(e.amount)||0), 0);

  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-mini-card">
      <div class="summary-mini-label">今月 (${thisYM.split('-')[1]}月)</div>
      <div class="summary-mini-val">¥${thisTotal.toLocaleString()}</div>
      <div class="summary-mini-sub">${cntOf(thisYM)}件</div>
    </div>
    <div class="summary-mini-card">
      <div class="summary-mini-label">先月 (${prevYM.split('-')[1]}月)</div>
      <div class="summary-mini-val">¥${prevTotal.toLocaleString()}</div>
      <div class="summary-mini-sub">${cntOf(prevYM)}件</div>
    </div>
    <div class="summary-mini-card">
      <div class="summary-mini-label">全期間</div>
      <div class="summary-mini-val">¥${allTotal.toLocaleString()}</div>
      <div class="summary-mini-sub">${all.length}件</div>
    </div>`;
}

function renderMonthlyBreakdown() {
  const all = collectAllForSummary();
  const cont = document.getElementById('monthlyBreakdown');
  if (!all.length) { cont.innerHTML = '<div class="empty-msg">データがありません</div>'; return; }

  const byMonth = {};
  all.forEach(e => {
    const ym = (e.date||'').slice(0,7) || '日付不明';
    byMonth[ym] = byMonth[ym] || { total: 0, cats: {} };
    byMonth[ym].total += Number(e.amount) || 0;
    const c = e.category || '未分類';
    byMonth[ym].cats[c] = (byMonth[ym].cats[c] || 0) + (Number(e.amount) || 0);
  });

  const months = Object.keys(byMonth).sort().reverse();
  cont.innerHTML = months.map(ym => {
    const m = byMonth[ym];
    const label = ym === '日付不明' ? '日付不明' : ym.replace('-', '年') + '月';
    const cats = Object.entries(m.cats).sort((a,b) => b[1]-a[1]);
    return `
      <div class="month-row">
        <div class="month-row-head">
          <span class="ym">${label}</span>
          <span class="total">¥${m.total.toLocaleString()}</span>
        </div>
        <div class="cat-table">
          ${cats.map(([c, amt]) => `
            <span class="cat">${esc(c)}</span>
            <span class="amt">¥${amt.toLocaleString()}</span>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderSendHistoryList() {
  const cont = document.getElementById('sendHistoryList');
  if (!sendHistory.length) {
    cont.innerHTML = '<div class="empty-msg">送信履歴はまだありません</div>';
    return;
  }
  cont.innerHTML = sendHistory.map((h, idx) => {
    const d = new Date(h.sentAt);
    const when = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="history-row">
        <div class="history-info">
          <div class="history-when">📤 ${when}</div>
          <div class="history-sub">${h.count}件 · ${esc(h.name)}</div>
          <button class="history-detail-btn" onclick="showHistoryDetail(${idx})">明細を見る</button>
        </div>
        <div class="history-total">¥${(Number(h.total)||0).toLocaleString()}</div>
      </div>`;
  }).join('');
}

function showHistoryDetail(idx) {
  const h = sendHistory[idx];
  if (!h) return;
  const d = new Date(h.sentAt);
  const when = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  document.getElementById('historyDetailTitle').textContent = `📤 ${when} の送信内容 (${h.count}件 / ¥${(Number(h.total)||0).toLocaleString()})`;
  document.getElementById('historyDetailBody').innerHTML = h.items.map(e => {
    const paySrcLabel = e.paymentSource
      ? (e.paymentSource === '現金' ? '💴 現金' : '💳 ' + e.paymentSource.replace('アメックス', ''))
      : '';
    const allocLabel = (Array.isArray(e.allocations) && e.allocations.length > 0)
      ? e.allocations.map(a => `${a.company}${a.percent}%`).join(' / ')
      : '';
    return `
      <div style="padding:8px 0;border-bottom:1px solid #f3f4f6">
        <div style="display:flex;justify-content:space-between">
          <span style="font-weight:600">${esc(e.store)}</span>
          <span style="font-weight:700;color:var(--primary)">¥${(Number(e.amount)||0).toLocaleString()}</span>
        </div>
        <div style="font-size:11px;color:#666;margin-top:2px">
          ${e.date} · ${esc(e.category)}
        </div>
        ${paySrcLabel ? `<div style="font-size:11px;color:#92400e;margin-top:2px">${paySrcLabel}</div>` : ''}
        ${allocLabel ? `<div style="font-size:11px;color:#5b21b6;margin-top:2px">🏢 ${esc(allocLabel)}</div>` : ''}
        ${e.memo ? `<div style="font-size:11px;color:#888;margin-top:2px">📝 ${esc(e.memo)}</div>` : ''}
      </div>`;
  }).join('');
  document.getElementById('historyDetailModal').style.display = 'flex';
}

function closeHistoryDetail() {
  document.getElementById('historyDetailModal').style.display = 'none';
}

// ================================================================
// ユーティリティ
// ================================================================
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

async function makeThumbnail(dataUrl) {
  if (!dataUrl) return null;
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(1, 400/img.width, 400/img.height);
      const c = document.createElement('canvas');
      c.width  = img.width  * ratio;
      c.height = img.height * ratio;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.5));
    };
    img.onerror = () => res(null);
    img.src = dataUrl;
  });
}

async function resizeImg(file, max) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, max/img.width, max/img.height);
        const c = document.createElement('canvas');
        c.width  = img.width  * ratio;
        c.height = img.height * ratio;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.drawImage(img, 0, 0, c.width, c.height);
        res(c.toDataURL('image/jpeg', 0.88));
      };
      img.onerror = () => res(null);
      img.src = e.target.result;
    };
    r.onerror = () => res(null);
    r.readAsDataURL(file);
  });
}
